name: Publish From Issue

on:
  issues:
    types:
      - opened
      - labeled
      - edited

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: publish-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync latest posts
        run: git pull --rebase --autostash origin main

      - name: Create markdown post
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/publish-from-issue.js

      - name: Commit post
        id: commit
        run: |
          POST_FILE=$(cat published-post-path.txt)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-files --error-unmatch "posts/${POST_FILE}" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add "posts/${POST_FILE}"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Publish ${POST_FILE}"
          git pull --rebase --autostash origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4

      - name: Comment and close issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const postFile = fs.readFileSync("published-post-path.txt", "utf8").trim();
            const changed = "${{ steps.commit.outputs.changed }}" === "true";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: changed
                ? `已发布为 \`posts/${postFile}\`，网站已经开始更新。`
                : `\`posts/${postFile}\` 已存在，没有重复发布。`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
